server:
  port: ${PORT:8080}

spring:
  application:
    name: mailpulseai-monolith

  # Database configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Asynchronous Event Processing Thread Pool Config
  task:
    execution:
      pool:
        core-size: 5
        max-size: 15
        queue-capacity: 100
        keep-alive: 10s
      thread-name-prefix: async-event-

  # AI API key (used by AIEmailProcessorService as primary Groq key)
  ai:
    openai:
      api-key: ${GROQ_API_KEY}

# Gmail OAuth Credentials
google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}
  refresh-token: ${GOOGLE_REFRESH_TOKEN}

# Polling Interval (60 seconds)
gmail:
  polling:
    interval-ms: 60000

# Twilio / WhatsApp Credentials
twilio:
  account:
    sid: ${TWILIO_ACCOUNT_SID}
  auth:
    token: ${TWILIO_AUTH_TOKEN}
  from: ${TWILIO_WHATSAPP_FROM}
  to: ${WHATSAPP_TO}

logging:
  level:
    com.mailpulseai: DEBUG
    org.springframework.web: INFO
    org.hibernate: WARN
