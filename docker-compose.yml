services:

  # ─── Database ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mailpulseai
      POSTGRES_USER: mailpulseai
      POSTGRES_PASSWORD: mailpulseai_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailpulseai -d mailpulseai"]
      interval: 10s
      retries: 5

  # ─── Monolithic Application ───────────────────────────────────────────────
  mailpulseai-app:
    build: ./mailpulseai-monolith
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mailpulseai
      SPRING_DATASOURCE_USERNAME: mailpulseai
      SPRING_DATASOURCE_PASSWORD: mailpulseai_secret
    restart: on-failure

volumes:
  postgres_data:
