

services:

  # ─── Infrastructure ────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports: ["2181:2181"]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: mailpulseai
      POSTGRES_USER: mailpulseai
      POSTGRES_PASSWORD: mailpulseai_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailpulseai -d mailpulseai"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ─── Optional: Kafka UI ───────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports: ["8090:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # ─── Spring Cloud Infrastructure ──────────────────────────────────────────

  eureka-server:
    build: ./eureka-server
    ports: ["8761:8761"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ─── Microservices ────────────────────────────────────────────────────────

  api-gateway:
    build: ./api-gateway
    ports: ["8080:8080"]
    depends_on:
      eureka-server:
        condition: service_healthy
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s

  email-ingestion-service:
    build: ./email-ingestion-service
    ports: ["8081:8081"]
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    env_file: .env
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: "6379"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  ai-processing-service:
    build: ./ai-processing-service
    ports: ["8082:8082"]
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    env_file: .env
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: "6379"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  whatsapp-messaging-service:
    build: ./whatsapp-messaging-service
    ports: ["8083:8083"]
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    env_file: .env
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: "6379"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  outbound-mail-service:
    build: ./outbound-mail-service
    ports: ["8084:8084"]
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    env_file: .env
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: "6379"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # ─── Dashboard UI ─────────────────────────────────────────────────────────
  dashboard:
    image: nginx:alpine
    ports: ["3000:80"]
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  postgres_data:
