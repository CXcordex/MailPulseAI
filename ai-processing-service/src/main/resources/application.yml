server:
  port: 8082

spring:
  application:
    name: ai-processing-service

  # ── Spring AI (Groq — free, OpenAI-compatible) ────────
  ai:
    openai:
      base-url: https://api.groq.com/openai
      api-key: ${GROQ_API_KEY}
      chat:
        options:
          # Groq free tier: llama-3.3-70b-versatile (30 RPM, 1000 RPD)
          # Excellent for classification, summarization, and drafting
          model: llama-3.3-70b-versatile
          max-tokens: 1024
          temperature: 0.3
      # BUG FIX: Spring AI defaults to 10 retries with huge exponential backoff on 429s.
      # This causes a single Rate Limit hit to hang the thread for ~30 mins, crashing Kafka.
    retry:
      max-attempts: 2
      backoff:
        initial-interval: 2s
        multiplier: 2
        max-interval: 10s

  # ── PostgreSQL + Hibernate ──────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Kafka ───────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ai-processing-group
      auto-offset-reset: earliest
      max-poll-records: 1
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: java.util.HashMap
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # BUG FIX: Disable type headers so downstream services (whatsapp, outbound)
        # can deserialize as HashMap without class-not-found errors
        spring.json.add.type.headers: false

  # ── Redis ───────────────────────────────────────────────
  # NOTE: RedisConfig.java reads spring.data.redis.host / port
  # These map from env vars SPRING_REDIS_HOST / SPRING_REDIS_PORT
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

# ── Eureka Service Discovery ────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

# ── Spring Boot Actuator ────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always

# ── Logging ─────────────────────────────────────────────
logging:
  level:
    com.mailpulseai: DEBUG
    org.springframework.ai: INFO
    org.apache.kafka: WARN
