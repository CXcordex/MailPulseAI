server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # AI Processing Service — dashboard API
        - id: ai-processing
          uri: lb://ai-processing-service
          predicates:
            - Path=/api/ai/**

        # WhatsApp Messaging Service + webhook
        - id: whatsapp
          uri: lb://whatsapp-messaging-service
          predicates:
            - Path=/api/whatsapp/**, /webhook/whatsapp/**

        # Email Ingestion Service
        - id: email-ingestion
          uri: lb://email-ingestion-service
          predicates:
            - Path=/api/emails/**

        # Outbound Mail Service
        - id: outbound-mail
          uri: lb://outbound-mail-service
          predicates:
            - Path=/api/mail/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

      globalcors:
        corsConfigurations:
          '[/**]':
            # BUG FIX: Spring Cloud Gateway CORS requires YAML lists, not comma-separated strings.
            # A single "GET,POST,..." string is treated as one method name and CORS silently fails.
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, gateway, metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.netflix: WARN
