server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: eureka-server   # Docker service name — other containers resolve this
    prefer-ip-address: false
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    wait-time-in-ms-when-sync-empty: 0
    enable-self-preservation: false   # disable in dev to avoid stuck registry entries

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
